version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: peec-mysql-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: peec_system
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/config/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - ./backups:/backups
    networks:
      - peec-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: peec-backend-prod
    restart: always
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: peec_system
      DB_PORT: 3306
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: 7d
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - peec-network

  # Frontend (Production)
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: peec-frontend-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - peec-network
    volumes:
      - ./ssl:/etc/nginx/ssl:ro

volumes:
  mysql_data:
    driver: local

networks:
  peec-network:
    driver: bridge
