version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: qualittest-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: qualittest_system
      MYSQL_USER: qualittest_user
      MYSQL_PASSWORD: qualittest_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/config/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - qualittest-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      timeout: 20s
      retries: 10

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qualittest-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DB_HOST: mysql
      DB_USER: qualittest_user
      DB_PASSWORD: qualittest_password
      DB_NAME: qualittest_system
      DB_PORT: 3306
      PORT: 5000
      JWT_SECRET: qualittest_jwt_secret_key_change_in_production
      JWT_EXPIRE: 7d
    ports:
      - "5001:5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - qualittest-network
    volumes:
      - ./server:/app/server
      - /app/node_modules

  # Frontend (Development)
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: qualittest-frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:5001/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - qualittest-network
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public
      - /app/node_modules
    stdin_open: true
    tty: true

volumes:
  mysql_data:
    driver: local

networks:
  qualittest-network:
    driver: bridge
